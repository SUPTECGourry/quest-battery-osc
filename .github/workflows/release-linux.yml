name: Release Linux Binary

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

    - name: Set up Python 3.12
      uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install runtime + build deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build single-file Linux executable
      run: pyinstaller --onefile --name quest-battery-osc --add-data "config.yaml:." --hidden-import websockets --hidden-import aiohttp --hidden-import zeroconf --hidden-import yaml --hidden-import pythonosc --collect-all zeroconf --collect-all aiohttp --strip main.py

    - name: Verify binary
      run: |
        ls -l dist/
        file dist/quest-battery-osc
        chmod +x dist/quest-battery-osc
        ./dist/quest-battery-osc --version || true

    - name: Upload artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: quest-battery-osc-linux
        path: dist/quest-battery-osc
        retention-days: 30

    - name: Create GitHub Release (on tag only)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/quest-battery-osc
        draft: true
        generate_release_notes: true
        prerelease: false