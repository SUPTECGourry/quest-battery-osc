name: Release Windows Binary

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-win11:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install runtime + build deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build single-file Windows 11 exe
      run: pyinstaller --onefile --name quest-battery-osc --add-data "config.yaml;." --hidden-import websockets --hidden-import aiohttp --hidden-import zeroconf --hidden-import yaml --hidden-import pythonosc --collect-all zeroconf --collect-all aiohttp --icon NONE --console main.py
      shell: cmd

    - name: Verify binary
      run: |
        dir dist
        dist\quest-battery-osc.exe --version || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: quest-battery-osc-win11
        path: dist/quest-battery-osc.exe
        retention-days: 30

    - name: Create GitHub Release (on tag only)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/quest-battery-osc.exe
        draft: true
        generate_release_notes: true
        prerelease: false